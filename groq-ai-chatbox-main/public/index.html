<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>AI Voice Chat </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ── Reset & tokens ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --surface:   #0d1117;
      --surface2:  #161b22;
      --border:    #21262d;
      --accent:    #00e5a0;
      --accent2:   #0ff;
      --user-bg:   #0d2b1f;
      --user-txt:  #d4f5e9;
      --ai-bg:     #0d1520;
      --ai-txt:    #cdd9e5;
      --muted:     #6e7681;
      --danger:    #ff4d4f;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
      --radius:    14px;
      --shadow:    0 0 40px rgba(0,229,160,.07);
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--ai-txt);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── Animated bg grid ─────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── Layout ───────────────────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100vh; max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ───────────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,16,.85);
      backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, #00e5a0, #0ff);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-weight: 800; font-size: 15px;
      color: #000; letter-spacing: -1px;
      box-shadow: 0 0 20px rgba(0,229,160,.35);
    }

    .header-title { font-family: var(--font-head); font-size: 17px; font-weight: 700; color: #e6edf3; }
    .header-sub   { font-size: 11px; color: var(--muted); letter-spacing: .5px; }

    .header-right { display: flex; align-items: center; gap: 8px; }

    /* ── Model selector ───────────────────────────────────────────────── */
    #modelSelect {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--ai-txt); font-family: var(--font-body); font-size: 12px;
      padding: 6px 10px; border-radius: 8px; cursor: pointer; outline: none;
      transition: border-color .2s;
    }
    #modelSelect:hover { border-color: var(--accent); }

    /* ── Icon buttons ─────────────────────────────────────────────────── */
    .icon-btn {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: all .2s; font-size: 15px;
    }
    .icon-btn:hover        { border-color: var(--accent); color: var(--accent); }
    .icon-btn.active       { background: rgba(0,229,160,.15); border-color: var(--accent); color: var(--accent); }
    .icon-btn:disabled     { opacity: .4; cursor: not-allowed; }

    /* ── Status bar ───────────────────────────────────────────────────── */
    #statusBar {
      padding: 6px 20px; font-size: 11px;
      color: var(--accent); letter-spacing: .4px;
      background: rgba(0,229,160,.05);
      border-bottom: 1px solid rgba(0,229,160,.1);
      flex-shrink: 0; min-height: 28px;
      transition: opacity .3s;
      font-family: var(--font-mono);
    }
    #statusBar:empty { min-height: 0; padding: 0; border: none; }

    /* ── Messages ─────────────────────────────────────────────────────── */
    #messages {
      flex: 1; overflow-y: auto;
      padding: 24px 20px; display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Message bubbles ──────────────────────────────────────────────── */
    .msg { display: flex; gap: 12px; animation: fadeUp .3s ease forwards; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user  { flex-direction: row-reverse; }
    .msg.user  .bubble { background: var(--user-bg); color: var(--user-txt); border-radius: var(--radius) var(--radius) 4px var(--radius); }
    .msg.ai    .bubble { background: var(--ai-bg);   color: var(--ai-txt);   border-radius: var(--radius) var(--radius) var(--radius) 4px; border: 1px solid var(--border); }
    .msg.error .bubble { background: rgba(255,77,79,.1); color: #ff8080; border: 1px solid rgba(255,77,79,.3); border-radius: var(--radius); }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; align-self: flex-end;
    }
    .msg.user  .avatar { background: linear-gradient(135deg,#00e5a0,#0ff); color: #000; }
    .msg.ai    .avatar { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); font-family: var(--font-mono); font-size: 11px; }
    .msg.error .avatar { background: rgba(255,77,79,.15); color: #ff4d4f; }

    .bubble {
      max-width: min(75%, 600px); padding: 12px 16px;
      font-size: 14.5px; line-height: 1.65;
      box-shadow: var(--shadow);
    }
    .bubble p          { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong     { color: var(--accent); }
    .bubble code       { font-family: var(--font-mono); font-size: 13px; background: rgba(0,229,160,.08); padding: 2px 6px; border-radius: 4px; color: #7ee7c8; }
    .bubble pre        { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
    .bubble pre code   { background: none; padding: 0; color: #a8d8c8; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li         { margin-bottom: 4px; }
    .bubble h1,.bubble h2,.bubble h3 { font-family: var(--font-head); color: #e6edf3; margin: 10px 0 6px; }
    .bubble a          { color: var(--accent); text-decoration: underline; }

    /* ── Typing cursor ────────────────────────────────────────────────── */
    .cursor::after {
      content: '▋';
      color: var(--accent);
      animation: blink .7s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Thinking dots ────────────────────────────────────────────────── */
    .thinking { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .thinking span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); opacity: .3;
      animation: think 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: .2s; }
    .thinking span:nth-child(3) { animation-delay: .4s; }
    @keyframes think { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1.1)} }

    /* ── Welcome card ─────────────────────────────────────────────────── */
    #welcome {
      margin: auto; text-align: center; padding: 32px 20px;
      animation: fadeUp .5s ease forwards;
    }
    .welcome-icon {
      width: 72px; height: 72px; border-radius: 22px;
      background: linear-gradient(135deg,#00e5a0,#0ff);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head); font-weight: 800; font-size: 26px;
      color: #000; margin: 0 auto 20px;
      box-shadow: 0 0 40px rgba(0,229,160,.3);
    }
    #welcome h2 { font-family: var(--font-head); font-size: 26px; font-weight: 800; color: #e6edf3; margin-bottom: 8px; }
    #welcome p  { color: var(--muted); font-size: 14px; max-width: 340px; margin: 0 auto 24px; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .suggestion  {
      padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--ai-txt); transition: all .2s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,.05); }

    /* ── Input area ───────────────────────────────────────────────────── */
    #inputArea {
      padding: 14px 20px; border-top: 1px solid var(--border);
      background: rgba(8,12,16,.9); backdrop-filter: blur(16px);
      flex-shrink: 0;
    }

    .input-row { display: flex; align-items: flex-end; gap: 10px; }

    #input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--ai-txt); font-family: var(--font-body); font-size: 14.5px;
      padding: 12px 16px; border-radius: var(--radius); outline: none; resize: none;
      max-height: 140px; min-height: 48px; line-height: 1.5;
      transition: border-color .2s, box-shadow .2s;
      scrollbar-width: none;
    }
    #input:focus  { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,.1); }
    #input::placeholder { color: var(--muted); }

    #sendBtn {
      width: 48px; height: 48px; border-radius: 13px; flex-shrink: 0;
      background: linear-gradient(135deg,#00e5a0,#0ff);
      border: none; cursor: pointer; color: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: all .2s;
      box-shadow: 0 0 20px rgba(0,229,160,.3);
    }
    #sendBtn:hover    { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,229,160,.5); }
    #sendBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .input-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 8px; padding: 0 2px;
    }
    .input-hint { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

    /* ── Voice active pulse ───────────────────────────────────────────── */
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(0,229,160,.4); }
      50%      { box-shadow: 0 0 0 8px rgba(0,229,160,0); }
    }
    .icon-btn.listening { animation: pulse 1s infinite; }

    /* ── Responsive ───────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 10px 14px; }
      #messages { padding: 16px 12px; }
      #inputArea { padding: 10px 12px; }
      .bubble { max-width: 88%; }
      .header-sub { display: none; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo">AI</div>
      <div>
        <div class="header-title">Aria</div>
        <div class="header-sub">Powered by Groq LLaMA</div>
      </div>
    </div>
    <div class="header-right">
      <select id="modelSelect" title="Select AI model">
        <option value="llama-3.1-8b-instant">LLaMA 3.1 8B ⚡</option>
        <option value="llama-3.3-70b-versatile">LLaMA 3.3 70B 🧠</option>
        <option value="mixtral-8x7b-32768">Mixtral 8x7B ⚖️</option>
      </select>
      <button class="icon-btn" id="btnVoice" title="Voice input">🎤</button>
      <button class="icon-btn" id="btnClear" title="Clear conversation">🗑️</button>
    </div>
  </header>

  <!-- Status bar -->
  <div id="statusBar"></div>

  <!-- Messages -->
  <div id="messages">
    <div id="welcome">
      <div class="welcome-icon">AI</div>
      <h2>Hello, I'm Aria</h2>
      <p>Ask me anything — or try a suggestion below. You can also use your voice.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="fillInput('Explain how neural networks work in simple terms')">🧠 How do neural networks work?</button>
        <button class="suggestion" onclick="fillInput('Write a Python function to reverse a linked list')">💻 Python: reverse a linked list</button>
        <button class="suggestion" onclick="fillInput('What is the difference between REST and GraphQL?')">🔌 REST vs GraphQL</button>
        <button class="suggestion" onclick="fillInput('Explain SOLID principles with examples')">📐 SOLID principles</button>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div id="inputArea">
    <div class="input-row">
      <textarea id="input" placeholder="Ask Aria anything…" rows="1"></textarea>
      <button id="sendBtn" title="Send message">➤</button>
    </div>
    <div class="input-meta">
      <span class="input-hint" id="charCount"></span>
      <span class="input-hint">Enter to send · Shift+Enter for new line</span>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const conversationHistory = []; // [{ role: 'user'|'assistant', content: '...' }]
let isStreaming = false;
let recognition = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const messagesEl   = document.getElementById('messages');
const inputEl      = document.getElementById('input');
const sendBtn      = document.getElementById('sendBtn');
const statusBar    = document.getElementById('statusBar');
const btnVoice     = document.getElementById('btnVoice');
const btnClear     = document.getElementById('btnClear');
const modelSelect  = document.getElementById('modelSelect');
const welcome      = document.getElementById('welcome');

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg) { statusBar.textContent = msg; }
function clearStatus()  { statusBar.textContent = ''; }

function scrollToBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
}

function fillInput(text) {
  inputEl.value = text;
  inputEl.focus();
  autoResize();
}

// ── Append message ────────────────────────────────────────────────────────────
function appendMessage(role, content, streaming = false) {
  if (welcome.parentNode) welcome.remove();

  const msgEl = document.createElement('div');
  msgEl.className = `msg ${role === 'user' ? 'user' : role === 'error' ? 'error' : 'ai'}`;

  const avatarEl = document.createElement('div');
  avatarEl.className = 'avatar';
  avatarEl.textContent = role === 'user' ? '✦' : role === 'error' ? '!' : 'AI';

  const bubbleEl = document.createElement('div');
  bubbleEl.className = 'bubble';

  if (role === 'user') {
    bubbleEl.textContent = content;
  } else if (streaming) {
    // Show thinking dots while waiting for first token
    bubbleEl.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
  } else {
    bubbleEl.innerHTML = marked.parse(content);
  }

  msgEl.appendChild(avatarEl);
  msgEl.appendChild(bubbleEl);
  messagesEl.appendChild(msgEl);
  scrollToBottom();
  return bubbleEl;
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage(text) {
  if (!text?.trim() || isStreaming) return;

  const userText = text.trim();
  inputEl.value  = '';
  autoResize();
  isStreaming     = true;
  sendBtn.disabled = true;

  // Show user bubble
  appendMessage('user', userText);

  // Push to history
  conversationHistory.push({ role: 'user', content: userText });

  // Show AI bubble with thinking dots
  const aiBubble = appendMessage('ai', '', true);
  let fullResponse = '';

  try {
    setStatus('⚡ Aria is thinking…');

    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: userText,
        history: conversationHistory.slice(0, -1), // exclude last user msg (sent separately)
        model:   modelSelect.value,
      }),
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error || `Server error ${resp.status}`);
    }

    // ── Stream processing ───────────────────────────────────────────────
    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer    = '';
    let firstToken = true;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line in buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const { token } = JSON.parse(data);
          if (token) {
            if (firstToken) {
              aiBubble.innerHTML = ''; // clear thinking dots
              firstToken = false;
            }
            fullResponse += token;
            // Render markdown progressively + blinking cursor
            aiBubble.innerHTML = marked.parse(fullResponse);
            aiBubble.classList.add('cursor');
            scrollToBottom();
            setStatus('⚡ Aria is responding…');
          }
        } catch { /* skip bad chunks */ }
      }
    }

    // Finalise — remove cursor, clean render
    aiBubble.classList.remove('cursor');
    aiBubble.innerHTML = marked.parse(fullResponse);

    // Store assistant response in history
    conversationHistory.push({ role: 'assistant', content: fullResponse });

    // Speak response (shorter ones only)
    if (fullResponse.length < 300) speakText(fullResponse.replace(/[#*`]/g, ''));

    clearStatus();

  } catch (err) {
    aiBubble.parentElement?.remove();
    appendMessage('error', `Error: ${err.message}`);
    // Remove failed user message from history
    conversationHistory.pop();
    setStatus('');
    console.error(err);
  } finally {
    isStreaming       = false;
    sendBtn.disabled  = false;
    inputEl.focus();
    scrollToBottom();
  }
}

// ── Text-to-speech ────────────────────────────────────────────────────────────
function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter  = new SpeechSynthesisUtterance(text);
  const voices = window.speechSynthesis.getVoices();
  utter.voice  = voices.find(v => v.lang.startsWith('en-') && v.name.includes('Female'))
              || voices.find(v => v.lang.startsWith('en'))
              || voices[0];
  utter.rate   = 1.05;
  utter.pitch  = 1;
  window.speechSynthesis.speak(utter);
}

// ── Voice input ───────────────────────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang        = 'en-US';
  recognition.interimResults = true;

  recognition.onstart = () => {
    btnVoice.classList.add('active', 'listening');
    setStatus('🎤 Listening… speak now');
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    inputEl.value = transcript;
    autoResize();

    // Auto-send when speech is final
    if (e.results[e.results.length - 1].isFinal) {
      recognition.stop();
      setTimeout(() => sendMessage(inputEl.value), 300);
    }
  };

  recognition.onerror = (e) => {
    setStatus(`Mic error: ${e.error}`);
    setTimeout(clearStatus, 3000);
  };

  recognition.onend = () => {
    btnVoice.classList.remove('active', 'listening');
    clearStatus();
  };

  btnVoice.addEventListener('click', () => {
    if (btnVoice.classList.contains('active')) {
      recognition.stop();
    } else {
      recognition.start();
    }
  });
} else {
  btnVoice.disabled = true;
  btnVoice.title    = 'Voice not supported in this browser';
}

// ── Clear conversation ────────────────────────────────────────────────────────
btnClear.addEventListener('click', () => {
  conversationHistory.length = 0;
  messagesEl.innerHTML       = '';
  messagesEl.appendChild(welcome);
  clearStatus();
  window.speechSynthesis?.cancel();
});

// ── Input events ──────────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  autoResize();
  const len = inputEl.value.length;
  document.getElementById('charCount').textContent = len > 0 ? `${len} chars` : '';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(inputEl.value);
  }
});

sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

// ── Model change announcement ─────────────────────────────────────────────────
modelSelect.addEventListener('change', () => {
  const name = modelSelect.options[modelSelect.selectedIndex].text;
  setStatus(`Model switched to ${name}`);
  setTimeout(clearStatus, 2500);
});

// ── Init focus ────────────────────────────────────────────────────────────────
inputEl.focus();
</script>
</body>
</html>
